# git-cliff configuration for open-redact-pdf.
#
# Regenerate CHANGELOG.md before a release with:
#   git-cliff -o CHANGELOG.md
# Or for the unreleased range only (e.g. when staging a new tag):
#   git-cliff --unreleased --tag v0.7.0 --prepend CHANGELOG.md

[changelog]
# Keep a Changelog 1.1.0 conventions.
header = """
# Changelog

All notable changes to this project are documented in this file.

The format is loosely based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to pre-1.0 [Semantic Versioning](https://semver.org/spec/v2.0.0.html):
under `0.x.y`, every minor bump may include behavioural changes that callers should review.

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first | trim }}\
{% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""
postprocessors = []

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->Added" },
    { message = "^fix", group = "<!-- 1 -->Fixed" },
    { message = "^perf", group = "<!-- 2 -->Performance" },
    { message = "^refactor", group = "<!-- 3 -->Changed" },
    { message = "^build", group = "<!-- 4 -->Build" },
    { message = "^ops", group = "<!-- 4 -->Build" },
    { message = "^docs", skip = true },
    { message = "^style", skip = true },
    { message = "^test", skip = true },
    { message = "^chore", skip = true },
    { message = "^revert", group = "<!-- 5 -->Reverted" },
    { message = ".*", skip = true },
]
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
