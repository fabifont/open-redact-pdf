name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked
      - name: Verify release version
        run: node scripts/check-release-version.mjs "${GITHUB_REF_NAME}"
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile=false
      - name: Run release validation
        run: |
          cargo test --workspace
          cargo clippy --workspace --all-targets -- -D warnings
          node scripts/build-wasm.mjs
          pnpm --filter @open-redact-pdf/sdk build
          pnpm --filter open-redact-pdf-demo-web build
          pnpm --filter open-redact-pdf-demo-web test

  publish_npm:
    runs-on: ubuntu-latest
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile=false
      - name: Build publishable SDK artifacts
        run: |
          node scripts/check-release-version.mjs "${GITHUB_REF_NAME}"
          node scripts/build-wasm.mjs
          pnpm --filter @open-redact-pdf/sdk build
      - name: Publish npm package
        run: npm publish --access public
        working-directory: packages/ts-sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish_crates:
    runs-on: ubuntu-latest
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify release version
        run: node scripts/check-release-version.mjs "${GITHUB_REF_NAME}"
      - name: Publish Rust crates
        run: bash scripts/publish-crates.sh
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
