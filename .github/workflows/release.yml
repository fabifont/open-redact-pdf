name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to verify or republish, for example v0.1.0
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4.2.0
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked
      - name: Verify release version
        run: node scripts/check-release-version.mjs "${RELEASE_TAG}"
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Run release validation
        run: |
          cargo test --workspace
          cargo clippy --workspace --all-targets -- -D warnings
          node scripts/build-wasm.mjs
          pnpm --filter @fabifont/open-redact-pdf build
          pnpm --filter open-redact-pdf-demo-web build
          pnpm --filter open-redact-pdf-demo-web test

  publish_npm:
    runs-on: ubuntu-latest
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4.2.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Build publishable SDK artifacts
        run: |
          node scripts/check-release-version.mjs "${RELEASE_TAG}"
          node scripts/build-wasm.mjs
          pnpm --filter @fabifont/open-redact-pdf build
      - name: Publish npm package
        run: npm publish --access public
        working-directory: packages/ts-sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish_crates:
    runs-on: ubuntu-latest
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-node@v4.2.0
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify release version
        run: node scripts/check-release-version.mjs "${RELEASE_TAG}"
      - name: Publish Rust crates
        run: bash scripts/publish-crates.sh
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
