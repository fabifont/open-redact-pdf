name: deploy-demo

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "packages/**"
      - "apps/demo-web/**"
      - "scripts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "pnpm-lock.yaml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Cache wasm-pack binary
        id: cache-wasm-pack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: wasm-pack-${{ runner.os }}-v1

      - name: Install wasm-pack
        if: steps.cache-wasm-pack.outputs.cache-hit != 'true'
        run: cargo install wasm-pack --locked

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4.2.0
        with:
          node-version: 22

      - run: pnpm install --frozen-lockfile

      - name: Build WASM
        run: node scripts/build-wasm.mjs

      - name: Build TS SDK
        run: pnpm --filter @fabifont/open-redact-pdf build

      - name: Build demo
        run: pnpm --filter open-redact-pdf-demo-web build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/demo-web/dist --project-name=open-redact-pdf
          packageManager: npm
